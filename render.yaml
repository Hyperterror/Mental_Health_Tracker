# ============================================================
# Render Deployment Configuration
# https://render.com/docs/render-yaml-spec
# ============================================================

services:
  # ── Backend API (Fastify) ──────────────────────────────────
  - type: web
    name: mindfulprep-api
    runtime: node
    region: singapore   # Closest to India
    plan: free
    rootDir: apps/api
    buildCommand: "npm install && npm run db:generate && npm run build"
    startCommand: "npm start"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false   # Set manually in Render dashboard
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false   # Set to your Vercel deployment URL
      - key: RATE_LIMIT_MAX
        value: 100
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
